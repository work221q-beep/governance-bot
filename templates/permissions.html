<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sylas | Permission Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }</style>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tab = urlParams.get('tab');
            if (tab) switchTab(tab);
            const msg = urlParams.get('msg');
            if (msg) showToast(decodeURIComponent(msg));
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabName).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-red-600', 'text-white');
                el.classList.add('bg-zinc-800', 'text-zinc-400');
            });
            document.getElementById('btn-' + tabName).classList.add('bg-red-600', 'text-white');
        }

        function showToast(message) {
            let toast = document.getElementById("toast-notification");
            toast.innerText = message;
            toast.classList.remove("hidden");
            setTimeout(() => toast.classList.add("hidden"), 5000);
        }

        function openChannelModal(btn) {
            const id = btn.getAttribute('data-id');
            const name = btn.getAttribute('data-name');
            document.getElementById('modal-channel-name').innerText = '#' + name;
            document.getElementById('override-form').action = `/server/{{ guild_id }}/channel_override/${id}`;
            document.getElementById('channel-modal').classList.remove('hidden');
        }

        function closeChannelModal() {
            document.getElementById('channel-modal').classList.add('hidden');
        }
    </script>
</head>
<body class="flex h-screen overflow-hidden relative">
    <div id="toast-notification" class="hidden fixed bottom-10 right-10 z-50 bg-[#181a20] border border-zinc-700 text-white px-6 py-4 rounded-xl shadow-2xl"></div>

    <div id="channel-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-[#141519] border border-zinc-800 w-full max-w-lg rounded-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-zinc-800 flex justify-between items-center bg-[#181a20]">
                <h3 class="text-xl font-bold text-white">Channel Overrides</h3>
                <button onclick="closeChannelModal()" class="text-zinc-500 hover:text-white text-2xl">&times;</button>
            </div>
            <form id="override-form" method="post" class="p-6 space-y-6">
                <div id="modal-channel-name" class="p-3 bg-black rounded border border-zinc-800 text-white font-mono"></div>
                <div>
                    <label class="block text-zinc-400 text-sm font-bold mb-2">Select Role</label>
                    <select name="role_id" class="w-full bg-black text-white p-3 rounded border border-zinc-800" required>
                        {% for r in roles %}<option value="{{ r.id }}">{{ r.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select name="view_channel" class="bg-zinc-900 text-white p-3 rounded border border-zinc-700">
                        <option value="inherit">View: Inherit</option>
                        <option value="allow">View: Allow</option>
                        <option value="deny">View: Deny</option>
                    </select>
                    <select name="send_messages" class="bg-zinc-900 text-white p-3 rounded border border-zinc-700">
                        <option value="inherit">Send: Inherit</option>
                        <option value="allow">Send: Allow</option>
                        <option value="deny">Send: Deny</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-red-600 py-3 rounded-xl font-bold hover:bg-red-500">Sync Override</button>
            </form>
        </div>
    </div>

    <aside class="w-64 bg-[#141519] border-r border-zinc-800 flex flex-col p-6">
        <h1 class="text-2xl font-black text-white mb-10 tracking-widest">SYLAS<span class="text-red-600">.AI</span></h1>
        <nav class="space-y-2">
            <a href="/server/{{ guild_id }}" class="block p-3 rounded text-zinc-400 hover:bg-zinc-800">🛡️ Live Sync</a>
            <a href="#" class="block p-3 rounded bg-red-600/10 text-red-500 border border-red-600/20">👥 Permissions</a>
            <a href="/dashboard" class="block p-3 rounded text-zinc-400 hover:bg-zinc-800 mt-10">← Dashboard</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-10">
        <div class="max-w-6xl mx-auto">
            <div class="flex gap-4 mb-10">
                <button id="btn-roles" onclick="switchTab('roles')" class="tab-btn bg-red-600 text-white px-6 py-3 rounded-lg font-bold">Roles</button>
                <button id="btn-users" onclick="switchTab('users')" class="tab-btn bg-zinc-800 text-zinc-400 px-6 py-3 rounded-lg font-bold">Users</button>
                <button id="btn-channels" onclick="switchTab('channels')" class="tab-btn bg-zinc-800 text-zinc-400 px-6 py-3 rounded-lg font-bold">Channels</button>
            </div>

            <div id="roles" class="tab-content grid grid-cols-3 gap-4">
                {% for r in roles %}
                <div class="bg-[#141519] border border-zinc-800 p-4 rounded-xl flex justify-between items-center">
                    <span class="text-white font-bold">{{ r.name }}</span>
                    <a href="/server/{{ guild_id }}#role-{{ r.id }}" class="text-xs text-red-500">Edit</a>
                </div>
                {% endfor %}
            </div>

            <div id="channels" class="tab-content hidden grid grid-cols-2 gap-4">
                {% for c in channels %}
                <div class="bg-[#141519] border border-zinc-800 p-4 rounded-xl flex justify-between items-center">
                    <span class="text-zinc-300 font-mono"># {{ c.name }}</span>
                    <button data-id="{{ c.id }}" data-name="{{ c.name }}" onclick="openChannelModal(this)" class="bg-zinc-800 px-4 py-2 rounded text-xs font-bold hover:bg-blue-600">Manage</button>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>
</body>
</html>
