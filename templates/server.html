<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sylas | Configuration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #f4f4f5; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#141519] border-r border-zinc-800 flex flex-col">
        <div class="p-6 border-b border-zinc-800">
            <h1 class="text-2xl font-black tracking-widest text-white">SYLAS<span class="text-red-600">.AI</span></h1>
            <p class="text-xs text-zinc-500 mt-1">Chaos Engine v2.0</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="block px-4 py-3 rounded-lg bg-red-600/10 text-red-500 font-semibold border border-red-500/20">⚙️ General Settings</a>
            <a href="/server/{{ guild_id }}/audit" class="block px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 transition">🛡️ Vulnerability Map</a>
            <a href="/dashboard" class="block px-4 py-3 rounded-lg text-zinc-400 hover:bg-zinc-800 transition mt-8">← Switch Server</a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-10 bg-[#0f1115]">
        <div class="max-w-4xl mx-auto">
            <header class="mb-10 flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-bold text-white mb-2">Module Configuration</h2>
                    <p class="text-zinc-400">Manage how the engine stress tests this guild.</p>
                </div>
            </header>

            <form method="post" action="/server/{{ guild_id }}/update" class="space-y-8">
                
                <section class="bg-[#181a20] border border-zinc-800 rounded-xl p-6 shadow-lg">
                    <h3 class="text-lg font-bold text-white mb-4 border-b border-zinc-800 pb-2">Core Settings</h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-zinc-400 mb-2">Command Prefix</label>
                            <input type="text" name="prefix" value="{{ config.prefix | default('!') }}" 
                                class="w-full bg-[#0f1115] border border-zinc-700 rounded-lg p-3 text-white focus:outline-none focus:border-red-500 transition">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-zinc-400 mb-2">AI Payload Model</label>
                            <select name="model" class="w-full bg-[#0f1115] border border-zinc-700 rounded-lg p-3 text-white focus:outline-none focus:border-red-500 transition appearance-none">
                                {% for m in models %}
                                    <option value="{{ m }}" {% if m == config.model %}selected{% endif %}>{{ m }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </section>

                <div class="bg-[#181a20] border border-zinc-800 rounded-xl p-6 shadow-lg flex justify-between items-center">
                    <p class="text-sm text-zinc-400 italic">Configuration updates are applied instantly.</p>
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-lg transition-colors shadow-lg shadow-red-900/20">
                        Save Changes
                    </button>
                </div>

            </form>
        </div>
    </main>
</body>
</html>
